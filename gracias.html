<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pago recibido | VUZALKA</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:#fff;
      color:#111;
      font-family:Arial, Helvetica, sans-serif;
      padding:24px;
    }
    .success-box{
      width:min(100%, 560px);
      border:1px solid #e7e7e7;
      padding:40px 28px;
      text-align:center;
      background:#fff;
    }
    .success-box h1{
      margin:0 0 12px;
      font-size:32px;
    }
    .success-box p{
      margin:0 0 24px;
      color:#555;
      line-height:1.6;
    }
    .success-box a{
      display:inline-block;
      padding:14px 22px;
      background:#111;
      color:#fff;
      text-decoration:none;
    }
  </style>
</head>
<body>
  <div class="success-box">
    <h1>Pago recibido</h1>
    <p>Tu pago fue procesado correctamente. Gracias por comprar en VUZALKA.</p>
    <a href="index.html">Volver al inicio</a>
  </div>
</body>
</html>
